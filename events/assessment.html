<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>From Completion to Competency &middot; ISTELive 26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --parchment:#f3ead4;
    --parchment-edge:#ece0c4;
    --card:#fdf9ef;
    --card-edge:#e4d6b4;
    --ink:#2c2620;
    --ink-soft:#6a6151;
    --gold:#bf9b30;
    --gold-deep:#9a7b1e;
    --black:#1d1a16;
    --line:#dccfac;
    --teal:#3f7d7a;
    --rust:#a8552f;
    --olive:#76793c;
    --tan:#a98c5f;
    --shadow:0 1px 2px rgba(45,38,28,.06), 0 6px 22px rgba(45,38,28,.07);
    --maxw:760px;
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    font-family:"Source Sans 3", system-ui, sans-serif;
    color:var(--ink);
    background:var(--parchment);
    background-image:
      radial-gradient(circle at 12% -5%, rgba(191,155,48,.10), transparent 38%),
      radial-gradient(circle at 92% 4%, rgba(168,85,47,.07), transparent 34%);
    line-height:1.58;
    font-size:17px;
  }
  a{color:var(--gold-deep); text-underline-offset:2px;}
  a:hover{color:var(--rust);}

  /* ---------- Header ---------- */
  header.bar{
    position:sticky; top:0; z-index:20;
    background:rgba(243,234,212,.93);
    backdrop-filter:saturate(1.1) blur(6px);
    border-bottom:1px solid var(--line);
  }
  .bar-inner{
    max-width:var(--maxw); margin:0 auto; padding:.55rem 1.1rem;
    display:flex; align-items:center; gap:1rem; justify-content:space-between;
  }
  .bar-title{font-family:"Spectral",Georgia,serif; font-weight:600; font-size:1rem; letter-spacing:.01em; line-height:1.15;}
  .bar-title span{display:block; font-family:"Source Sans 3",sans-serif; font-weight:500; font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-soft);}
  .toggle{display:inline-flex; border:1px solid var(--gold); border-radius:999px; overflow:hidden; background:var(--card); flex:none;}
  .toggle button{
    appearance:none; border:0; background:transparent; cursor:pointer;
    font-family:"Source Sans 3",sans-serif; font-weight:600; font-size:.78rem; letter-spacing:.04em;
    padding:.34rem .8rem; color:var(--gold-deep);
  }
  .toggle button[aria-pressed="true"]{background:var(--gold); color:#fff;}
  .toggle button:focus-visible{outline:2px solid var(--rust); outline-offset:-2px;}

  /* ---------- Hero ---------- */
  .hero{max-width:var(--maxw); margin:0 auto; padding:2.6rem 1.1rem 1.2rem; position:relative;}
  .eyebrow{font-size:.74rem; letter-spacing:.2em; text-transform:uppercase; color:var(--rust); font-weight:600;}
  .hero h1{
    font-family:"Spectral",Georgia,serif; font-weight:700;
    font-size:clamp(2.1rem,7vw,3.3rem); line-height:1.02; margin:.5rem 0 .15rem; color:var(--black);
    letter-spacing:-.01em;
  }
  .hero .sub{font-family:"Spectral",serif; font-style:italic; font-size:clamp(1.05rem,3.4vw,1.4rem); color:var(--ink-soft); margin:0 0 1.1rem;}
  .credit{font-size:.82rem; letter-spacing:.05em; color:var(--ink-soft); text-transform:uppercase; margin-bottom:1.5rem;}
  .credit b{color:var(--ink); font-weight:600;}
  .driving{
    background:var(--card); border:1px solid var(--card-edge); border-left:4px solid var(--gold);
    border-radius:4px; padding:1rem 1.15rem; box-shadow:var(--shadow); margin-bottom:1rem;
  }
  .driving .q-label{font-size:.72rem; letter-spacing:.16em; text-transform:uppercase; color:var(--gold-deep); font-weight:600;}
  .driving p{font-family:"Spectral",serif; font-size:1.18rem; line-height:1.4; margin:.3rem 0 0; color:var(--ink);}
  .compass{position:absolute; top:1.4rem; right:1rem; width:62px; height:62px; opacity:.5;}
  @media(max-width:620px){.compass{display:none;}}

  /* ---------- Trail ---------- */
  .trail{max-width:var(--maxw); margin:1.4rem auto 0; padding:0 1.1rem 1rem; position:relative;}
  .trail::before{
    content:""; position:absolute; left:calc(1.1rem + 17px); top:6px; bottom:120px; width:0;
    border-left:3px dotted var(--gold); opacity:.55;
  }
  .stop{position:relative; padding-left:54px; margin-bottom:1.5rem;}
  .marker{
    position:absolute; left:0; top:2px; width:36px; height:36px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; z-index:2;
    font-family:"Spectral",serif; font-weight:700; font-size:1.02rem; color:#fff;
    box-shadow:0 0 0 5px var(--parchment), var(--shadow);
  }
  .stop-card{
    background:var(--card); border:1px solid var(--card-edge); border-radius:6px;
    padding:1.05rem 1.15rem 1.15rem; box-shadow:var(--shadow);
  }
  .stop.slim .stop-card{background:linear-gradient(180deg,#fdf9ef,#f7efdc);}
  .stop-head{display:flex; align-items:baseline; justify-content:space-between; gap:.8rem; flex-wrap:wrap;}
  .stop-head h2{font-family:"Spectral",serif; font-weight:600; font-size:1.3rem; margin:0; color:var(--black); line-height:1.1;}
  .time{flex:none; font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-soft); border:1px solid var(--line); border-radius:999px; padding:.12rem .55rem; background:var(--parchment);}
  .purpose{margin:.35rem 0 .9rem; color:var(--ink-soft); font-size:.98rem;}

  /* ---------- Blocks ---------- */
  .prose{margin:.6rem 0;}
  .b-list{margin:.55rem 0; padding-left:1.2rem;}
  .b-list li{margin:.28rem 0;}
  .b-list li b, .b-list li strong{color:var(--ink);}

  table.b-table{width:100%; border-collapse:collapse; margin:.7rem 0; font-size:.96rem; background:#fffdf8; border:1px solid var(--line); border-radius:6px; overflow:hidden;}
  .table-wrap{overflow-x:auto; -webkit-overflow-scrolling:touch;}
  table.b-table th{font-family:"Source Sans 3",sans-serif; text-align:left; font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:#fff; background:var(--olive); padding:.5rem .7rem; font-weight:600;}
  table.b-table th:first-child{background:var(--ink-soft);}
  table.b-table td{padding:.5rem .7rem; border-top:1px solid var(--line); vertical-align:top;}
  table.b-table td:first-child{font-weight:600; color:var(--ink); width:34%;}
  table.b-table tr:nth-child(even) td{background:rgba(220,207,172,.16);}

  .callout{border-radius:5px; padding:.85rem 1rem; margin:.8rem 0; font-size:1rem;}
  .callout-frame{background:#fbf3da; border:1px solid var(--gold); border-left:4px solid var(--gold); font-family:"Spectral",serif; font-size:1.2rem; line-height:1.35; color:var(--black); font-weight:500;}
  .callout-goal{background:rgba(63,125,122,.10); border-left:4px solid var(--teal); color:#264e4c;}
  .callout-note{background:rgba(169,140,95,.13); border-left:4px solid var(--tan); color:#5c4d34;}
  .callout-facilitator{background:rgba(168,85,47,.10); border-left:4px solid var(--rust); color:#7c3a1d; font-style:italic;}
  .callout-prompt-line{background:#fff; border:1px dashed var(--gold-deep); color:var(--ink); font-family:"Spectral",serif; font-size:1.12rem; line-height:1.35;}

  .prompt{background:#fffdf7; border:1px solid var(--card-edge); border-radius:6px; padding:.7rem .85rem; margin:.6rem 0; position:relative;}
  .prompt.feature{border:1px solid var(--gold); box-shadow:0 0 0 3px rgba(191,155,48,.12);}
  .prompt-label{font-size:.72rem; letter-spacing:.08em; text-transform:uppercase; font-weight:700; color:var(--gold-deep); margin-bottom:.3rem; padding-right:4.5rem;}
  .prompt-text{font-family:"Spectral",serif; font-size:1rem; line-height:1.45; color:var(--ink);}
  .copy{position:absolute; top:.6rem; right:.6rem; appearance:none; border:1px solid var(--line); background:var(--parchment); color:var(--ink-soft); border-radius:5px; font-family:"Source Sans 3",sans-serif; font-size:.7rem; font-weight:600; letter-spacing:.05em; text-transform:uppercase; padding:.25rem .5rem; cursor:pointer;}
  .copy:hover{border-color:var(--gold); color:var(--gold-deep);}
  .copy.done{color:var(--teal); border-color:var(--teal);}

  .btn-padlet{display:inline-flex; align-items:center; gap:.5rem; background:var(--rust); color:#fff; text-decoration:none; font-weight:600; padding:.6rem 1.05rem; border-radius:6px; box-shadow:var(--shadow); letter-spacing:.01em;}
  .btn-padlet:hover{background:#8f4525; color:#fff;}
  .btn-note{font-size:.82rem; color:var(--ink-soft); margin:.4rem 0 0;}

  details.acc{border:1px solid var(--card-edge); border-radius:6px; margin:.55rem 0; background:#fffdf8; overflow:hidden;}
  details.acc>summary{
    list-style:none; cursor:pointer; padding:.62rem .85rem; display:flex; align-items:center; gap:.6rem;
    font-family:"Source Sans 3",sans-serif; font-weight:600; color:var(--ink); font-size:.95rem;
    background:linear-gradient(180deg,#fbf4e1,#f5ead0);
  }
  details.acc>summary::-webkit-details-marker{display:none;}
  details.acc>summary::before{
    content:""; flex:none; width:11px; height:11px; border-right:2px solid var(--gold-deep); border-bottom:2px solid var(--gold-deep);
    transform:rotate(-45deg); transition:transform .18s ease; margin-left:2px;
  }
  details.acc[open]>summary::before{transform:rotate(45deg);}
  .acc-body{padding:.4rem .95rem .85rem;}
  .acc-body>.prose:first-child{margin-top:.5rem;}

  .pending{border:1px dashed var(--tan); background:rgba(169,140,95,.08); border-radius:6px; padding:.75rem .9rem; color:#5c4d34; font-size:.92rem;}
  .pending::before{content:"Building next \00b7 "; font-weight:700; color:var(--rust); letter-spacing:.02em;}

  /* ---------- Shelf ---------- */
  .shelf{max-width:var(--maxw); margin:1.5rem auto 0; padding:1.6rem 1.1rem 3rem; border-top:2px solid var(--line);}
  .shelf-head{display:flex; align-items:baseline; gap:.7rem; flex-wrap:wrap; margin-bottom:.3rem;}
  .shelf-head h2{font-family:"Spectral",serif; font-weight:700; font-size:1.5rem; margin:0; color:var(--black);}
  .shelf-head .pill{font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-soft);}
  .shelf-intro{color:var(--ink-soft); margin:.1rem 0 1rem; font-size:.96rem;}
  .shelf details.acc>summary{font-family:"Spectral",serif; font-size:1.02rem;}
  .shelf .summary-note{color:var(--ink-soft); font-size:.9rem; margin:.5rem 0 .2rem;}

  /* ---------- Mode behavior ---------- */
  body.mode-live .shelf{display:none;}
  body.mode-live .shelf-stub-note{display:block;}
  .shelf-stub-note{display:none; max-width:var(--maxw); margin:0 auto; padding:1.4rem 1.1rem 3rem; color:var(--ink-soft); font-size:.92rem; border-top:2px solid var(--line);}
  body.mode-explore .shelf-stub-note{display:none;}

  footer.feet{max-width:var(--maxw); margin:0 auto; padding:1.5rem 1.1rem 3rem; color:var(--ink-soft); font-size:.82rem; border-top:1px solid var(--line);}

  :focus-visible{outline:2px solid var(--rust); outline-offset:2px; border-radius:3px;}
  @media (prefers-reduced-motion:reduce){*{transition:none !important;}}
  @media(max-width:520px){
    body{font-size:16px;}
    .stop{padding-left:46px;}
    .marker{width:32px; height:32px; font-size:.92rem;}
    .trail::before{left:calc(1.1rem + 15px);}
  }
</style>
</head>
<body class="mode-live">

<header class="bar">
  <div class="bar-inner">
    <div class="bar-title">From Completion to Competency<span>ISTELive 26</span></div>
    <div class="toggle" role="group" aria-label="View mode">
      <button id="mLive" aria-pressed="true">Live</button>
      <button id="mExplore" aria-pressed="false">Explore</button>
    </div>
  </div>
</header>

<section class="hero">
  <svg class="compass" viewBox="0 0 100 100" aria-hidden="true">
    <circle cx="50" cy="50" r="46" fill="none" stroke="#bf9b30" stroke-width="2"/>
    <circle cx="50" cy="50" r="38" fill="none" stroke="#bf9b30" stroke-width="1" opacity=".6"/>
    <polygon points="50,12 57,50 50,46 43,50" fill="#a8552f"/>
    <polygon points="50,88 43,50 50,54 57,50" fill="#2c2620"/>
    <circle cx="50" cy="50" r="3.5" fill="#bf9b30"/>
  </svg>
  <div class="eyebrow">A 50-minute assessment redesign sprint</div>
  <h1>From Completion to Competency</h1>
  <p class="sub">Assessment in the Age of AI</p>
  <div class="credit">Facilitated by <b>Jeremiah Okal-Frink</b></div>
  <div class="driving">
    <div class="q-label">Driving question</div>
    <p id="drivingQ"></p>
  </div>
</section>

<main class="trail" id="trail" aria-label="Session path"></main>

<div class="shelf-stub-note">Switch to <b>Explore</b> (top right) to open the resource shelf and every panel for carry-onward use.</div>

<section class="shelf" id="shelf" aria-label="Resource shelf"></section>

<footer class="feet" id="feet"></footer>

<script src="session-data.js"></script>
<script>
(function(){
  var D = window.SESSION_DATA;
  var trail = document.getElementById('trail');
  if(!D){
    trail.innerHTML = '<div class="pending" style="border-style:solid">Content file not loaded. Keep <b>index.html</b> and <b>session-data.js</b> in the same folder, then open index.html.</div>';
    return;
  }
  var BADGE = ['var(--teal)','var(--rust)','var(--olive)','var(--tan)'];

  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function node(html){var t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstChild;}

  function renderBlock(b){
    switch(b.type){
      case 'prose':
        return node('<div class="prose">'+b.html+'</div>');
      case 'callout':
        return node('<div class="callout callout-'+(b.variant||'note')+'">'+b.html+'</div>');
      case 'list': {
        var tag = b.ordered ? 'ol':'ul';
        var lis = b.items.map(function(it){
          if(typeof it === 'string') return '<li>'+it+'</li>';
          return '<li><strong>'+it.lead+':</strong> '+it.text+'</li>';
        }).join('');
        return node('<'+tag+' class="b-list">'+lis+'</'+tag+'>');
      }
      case 'table': {
        var th = b.head.map(function(h){return '<th>'+esc(h)+'</th>';}).join('');
        var tr = b.rows.map(function(r){
          return '<tr>'+r.map(function(c){return '<td>'+c+'</td>';}).join('')+'</tr>';
        }).join('');
        return node('<div class="table-wrap"><table class="b-table"><thead><tr>'+th+'</tr></thead><tbody>'+tr+'</tbody></table></div>');
      }
      case 'prompt': {
        var wrap = node('<div class="prompt'+(b.variant==='feature'?' feature':'')+'">'+
          (b.label?'<div class="prompt-label">'+esc(b.label)+'</div>':'')+
          '<div class="prompt-text"></div>'+
          '<button class="copy" type="button">Copy</button></div>');
        wrap.querySelector('.prompt-text').textContent = b.text;
        var btn = wrap.querySelector('.copy');
        btn.addEventListener('click', function(){
          var txt = b.text;
          var done = function(){ btn.textContent='Copied'; btn.classList.add('done'); setTimeout(function(){btn.textContent='Copy'; btn.classList.remove('done');},1400); };
          if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(done, fallback); }
          else fallback();
          function fallback(){ var ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy'); done();}catch(e){} document.body.removeChild(ta); }
        });
        return wrap;
      }
      case 'linkbutton': {
        var w = node('<div class="linkbtn-wrap"></div>');
        w.appendChild(node('<a class="btn-padlet" href="'+b.url+'" target="_blank" rel="noopener">'+esc(b.label)+' &rarr;</a>'));
        if(b.note) w.appendChild(node('<p class="btn-note">'+esc(b.note)+'</p>'));
        return w;
      }
      case 'accordion': {
        var det = document.createElement('details'); det.className='acc';
        det.appendChild(node('<summary>'+esc(b.title)+'</summary>'));
        var body = node('<div class="acc-body"></div>');
        (b.blocks||[]).forEach(function(nb){ body.appendChild(renderBlock(nb)); });
        det.appendChild(body);
        return det;
      }
      case 'pending':
        return node('<div class="pending">'+esc(b.note)+'</div>');
      default:
        return node('<div class="prose"></div>');
    }
  }

  // Driving question + frame
  document.getElementById('drivingQ').textContent = D.meta.drivingQuestion;

  // Stops
  D.stops.forEach(function(s){
    var sec = document.createElement('section');
    sec.className = 'stop' + (s.slim?' slim':'');
    sec.id = s.id;
    var color = BADGE[(s.number-1)%BADGE.length];
    sec.appendChild(node('<div class="marker" style="background:'+color+'">'+s.number+'</div>'));
    var card = node('<div class="stop-card"></div>');
    card.appendChild(node('<div class="stop-head"><h2>'+esc(s.title)+'</h2></div>'));
    if(s.purpose) card.appendChild(node('<p class="purpose">'+s.purpose+'</p>'));
    (s.blocks||[]).forEach(function(b){ card.appendChild(renderBlock(b)); });
    sec.appendChild(card);
    trail.appendChild(sec);
  });

  // Shelf
  var shelf = document.getElementById('shelf');
  shelf.appendChild(node('<div class="shelf-head"><h2>Resource Shelf</h2><span class="pill">Carry-onward</span></div>'));
  shelf.appendChild(node('<p class="shelf-intro">Not needed to run the activities. This is the durable library to move through as it makes sense to you, during the session and after.</p>'));
  D.shelf.forEach(function(item){
    var det = document.createElement('details'); det.className='acc';
    det.appendChild(node('<summary>'+esc(item.title)+'</summary>'));
    var body = node('<div class="acc-body"></div>');
    if(item.summary) body.appendChild(node('<p class="summary-note">'+esc(item.summary)+'</p>'));
    (item.blocks||[]).forEach(function(b){ body.appendChild(renderBlock(b)); });
    det.appendChild(body);
    shelf.appendChild(det);
  });

  document.getElementById('feet').innerHTML =
    'From Completion to Competency &middot; '+esc(D.meta.event)+' &middot; companion resource. '+
    '<a href="'+D.meta.padletUrl+'" target="_blank" rel="noopener">Shared Padlet</a>.';

  // ---- Mode toggle ----
  var bLive = document.getElementById('mLive');
  var bExplore = document.getElementById('mExplore');
  function setMode(mode){
    var explore = (mode==='explore');
    document.body.classList.toggle('mode-explore', explore);
    document.body.classList.toggle('mode-live', !explore);
    bLive.setAttribute('aria-pressed', String(!explore));
    bExplore.setAttribute('aria-pressed', String(explore));
    // open every panel in Explore, close in Live
    document.querySelectorAll('details.acc').forEach(function(d){ d.open = explore; });
  }
  bLive.addEventListener('click', function(){ setMode('live'); });
  bExplore.addEventListener('click', function(){ setMode('explore'); });
  setMode('live');
})();
</script>
</body>
</html>
